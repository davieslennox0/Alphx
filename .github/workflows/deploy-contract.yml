name: Deploy FXOracle Contract to Casper Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet

env:
  CASPER_NODE_URL: https://node.testnet.casper.network/rpc
  CHAIN_NAME: casper-test

jobs:
  deploy:
    name: Deploy Pre-built WASM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify WASM exists
        run: ls -lh contract/wasm/FXOracle.wasm

      - name: Install casper-js-sdk v5
        run: npm install casper-js-sdk@5.0.12

      - name: Deploy to Casper Testnet
        id: deploy
        env:
          SECRET_KEY: ${{ secrets.ORACLE_WALLET_SECRET_KEY }}
        run: |
          echo "$SECRET_KEY" > /tmp/secret_key.pem
          chmod 600 /tmp/secret_key.pem

          node << 'JSEOF'
          const {
            Deploy, DeployHeader, ExecutableDeployItem, Args,
            PrivateKey, PublicKey, KeyAlgorithm, RpcClient, HttpHandler
          } = require('casper-js-sdk');
          const fs = require('fs');

          const NODE_URL = process.env.CASPER_NODE_URL;
          const CHAIN    = process.env.CHAIN_NAME;

          async function main() {
            const rpcHandler = new HttpHandler(NODE_URL);
            const rpcClient  = new RpcClient(rpcHandler);

            const privateKey = await PrivateKey.fromPem(
              fs.readFileSync('/tmp/secret_key.pem', 'utf8'),
              KeyAlgorithm.ED25519
            );

            const wasm = fs.readFileSync('contract/wasm/FXOracle.wasm');

            const session = ExecutableDeployItem.newModuleBytes(
              new Uint8Array(wasm),
              Args.fromMap({})
            );
            const payment = ExecutableDeployItem.standardPayment('100000000000');

            const header = DeployHeader.default();
            header.account   = privateKey.publicKey;
            header.chainName = CHAIN;

            const deploy = Deploy.makeDeploy(header, payment, session);
            deploy.sign(privateKey);

            const result = await rpcClient.putDeploy(deploy);
            const hash = result.deployHash;

            console.log(`Deploy hash: ${hash}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_hash=${hash}\n`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF

          rm -f /tmp/secret_key.pem

      - name: Wait for finality
        run: sleep 90

      - name: Get contract hash
        id: contract
        run: |
          node << 'JSEOF'
          const { RpcClient, HttpHandler } = require('casper-js-sdk');
          const fs = require('fs');

          async function main() {
            const rpcClient = new RpcClient(new HttpHandler(process.env.CASPER_NODE_URL));

            try {
              const stateRoot = (await rpcClient.getLatestStateRootHash()).stateRootHash;
              const ACCOUNT_HASH = "account-hash-9383e3e17e9c20f19be6316b7cf952d37a6314975a7637cef8abca5f73413b06";
              const resp = await rpcClient.getBlockState(stateRoot, ACCOUNT_HASH, []);
              const namedKeys = resp?.Account?.namedKeys || [];
              let contractHash = "";
              for (const nk of namedKeys) {
                const n = (nk.name || nk.Name || "").toLowerCase();
                if (n.includes("alphx") || n.includes("oracle") || n.includes("fx")) {
                  contractHash = nk.key || nk.Key || "";
                  break;
                }
              }
              console.log(`Named keys found: ${namedKeys.length}`);
              if (namedKeys.length) console.log(JSON.stringify(namedKeys.slice(0,5)));
              console.log(`Contract hash: ${contractHash}`);
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `contract_hash=${contractHash}\n`);
            } catch(e) {
              console.error("Could not get contract hash:", e.message);
            }
          }

          main().catch(e => console.error(e));
          JSEOF

      - name: Output results
        run: |
          echo ""
          echo "==============================="
          echo "  ALPHX CONTRACT DEPLOYED"
          echo "==============================="
          echo "  Deploy hash : ${{ steps.deploy.outputs.deploy_hash }}"
          echo "  Contract    : ${{ steps.contract.outputs.contract_hash }}"
          echo "  Explorer    : https://testnet.cspr.live/deploy/${{ steps.deploy.outputs.deploy_hash }}"
          echo "==============================="
          echo "Add to .env:"
          echo "ORACLE_CONTRACT_HASH=${{ steps.contract.outputs.contract_hash }}"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphx-oracle-wasm
          path: contract/wasm/*.wasm
          retention-days: 30
