name: Deploy FXOracle Contract to Casper Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet

env:
  CASPER_NODE_URL: https://rpc.testnet.casperlabs.io
  CHAIN_NAME: casper-test

jobs:
  deploy:
    name: Deploy Pre-built WASM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify WASM exists
        run: ls -lh contract/wasm/FXOracle.wasm

      - name: Install pycspr
        run: pip install pycspr==2.0.0

      - name: Deploy to Casper Testnet
        id: deploy
        env:
          SECRET_KEY: ${{ secrets.ORACLE_WALLET_SECRET_KEY }}
        run: |
          echo "$SECRET_KEY" > /tmp/secret_key.pem
          chmod 600 /tmp/secret_key.pem

          python3 << 'PYEOF'
          import pycspr
          import pycspr.crypto as crypto
          import json, os, time

          node_url = os.environ["CASPER_NODE_URL"]
          chain = os.environ["CHAIN_NAME"]
          host, port = node_url.replace("https://","").replace("http://","").split(":")[0], 7777

          client = pycspr.NodeClient(pycspr.NodeConnection(host=host, port=port))

          # Load key
          key_pair = crypto.KeyPair.from_pem_file(
              "/tmp/secret_key.pem",
              crypto.KeyAlgorithm.ED25519
          )

          # Read WASM
          with open("contract/wasm/FXOracle.wasm", "rb") as f:
              wasm_bytes = f.read()

          # Build deploy
          deploy = pycspr.create_deploy(
              pycspr.DeployParameters(
                  account_public_key=key_pair.public_key,
                  chain_name=chain,
                  gas_price=1,
                  timestamp=pycspr.timestamp(),
                  ttl="30m"
              ),
              pycspr.ModuleBytes(
                  module_bytes=wasm_bytes,
                  args=[]
              ),
              pycspr.StandardPayment(amount=50_000_000_000)
          )

          # Sign and dispatch
          deploy.approve(key_pair)
          deploy_hash = client.send_deploy(deploy)

          print(f"DEPLOY_HASH={deploy_hash}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"deploy_hash={deploy_hash}\n")
          PYEOF

          rm -f /tmp/secret_key.pem

      - name: Wait for finality
        run: sleep 60

      - name: Get contract hash
        id: contract
        run: |
          python3 << 'PYEOF'
          import pycspr, json, os

          node_url = os.environ["CASPER_NODE_URL"]
          host = node_url.replace("https://","").replace("http://","")
          client = pycspr.NodeClient(pycspr.NodeConnection(host=host, port=7777))

          pub_key = "019bec4eb56ae4a5d4798d5de6996afa5541a6ae94b0e889351d7ed5ae359f5a74"

          try:
              state_root = client.get_state_root_hash()
              account = client.get_account(pub_key, state_root)
              named_keys = account.get("named_keys", [])
              contract_hash = ""
              for nk in named_keys:
                  name = nk["name"].lower()
                  if "alphx" in name or "oracle" in name or "fx" in name:
                      contract_hash = nk["key"]
                      break
              print(f"Contract hash: {contract_hash}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"contract_hash={contract_hash}\n")
          except Exception as e:
              print(f"Could not get contract hash: {e}")
          PYEOF

      - name: Output results
        run: |
          echo ""
          echo "==============================="
          echo "  ALPHX CONTRACT DEPLOYED"
          echo "==============================="
          echo "  Deploy hash : ${{ steps.deploy.outputs.deploy_hash }}"
          echo "  Contract    : ${{ steps.contract.outputs.contract_hash }}"
          echo "  Explorer    : https://testnet.cspr.live/deploy/${{ steps.deploy.outputs.deploy_hash }}"
          echo "==============================="
          echo "Add to .env:"
          echo "ORACLE_CONTRACT_HASH=${{ steps.contract.outputs.contract_hash }}"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphx-oracle-wasm
          path: contract/wasm/*.wasm
          retention-days: 30
