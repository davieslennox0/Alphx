name: Deploy FXOracle Contract to Casper Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet

env:
  CASPER_NODE_URL: https://node.testnet.casper.network/rpc
  CHAIN_NAME: casper-test

jobs:
  build-and-deploy:
    name: Build WASM & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build minimal Casper 2.0-compatible WASM from WAT ─────────────────
      # The full Odra FXOracle.wasm uses bulk-memory operations that the
      # Casper 2.0 VM does not yet support.  We deploy a hand-written WAT
      # module that has zero bulk-memory instructions and stores the named key
      # "alphx_oracle" so the contract slot is visible on-chain immediately.
      # The Odra WASM is preserved as an artifact for audit and future upgrade.
      - name: Install binaryen (wasm-as)
        run: sudo apt-get install -y binaryen

      - name: Compile minimal WAT → WASM
        run: |
          wasm-as contract/minimal/FXOracle_minimal.wat \
            -o contract/wasm/FXOracle_deploy.wasm
          echo "=== Deploy WASM ==="
          ls -lh contract/wasm/FXOracle_deploy.wasm
          wasm-opt contract/wasm/FXOracle_deploy.wasm --print-features 2>&1 || true

      # ── Also build the full Odra contract for artifact/audit ──────────────
      - name: Install Rust nightly + wasm32 target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install build deps (Odra)
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-odra
        run: cargo install cargo-odra --version 0.1.7 --locked

      - name: Build full Odra FXOracle.wasm (for audit artifact)
        working-directory: contract
        env:
          RUSTFLAGS: "-C link-arg=--import-undefined -C target-feature=-bulk-memory,-sign-ext,-nontrapping-fptoint,-reference-types"
        run: |
          cargo odra build || true
          if [ -f wasm/FXOracle.wasm ]; then
            echo "Full Odra WASM built: $(ls -lh wasm/FXOracle.wasm | awk '{print $5}')"
            wasm-opt wasm/FXOracle.wasm --print-features 2>&1 || true
          else
            echo "Odra WASM not found (non-fatal; deploy WASM is already built)"
          fi

      # ── Deploy minimal WASM to Casper Testnet ────────────────────────────
      - name: Install casper-js-sdk v5
        run: npm install casper-js-sdk@5.0.12

      - name: Deploy to Casper Testnet
        id: deploy
        env:
          SECRET_KEY: ${{ secrets.ORACLE_WALLET_SECRET_KEY }}
        run: |
          echo "$SECRET_KEY" > /tmp/secret_key.pem
          chmod 600 /tmp/secret_key.pem

          node << 'JSEOF'
          const {
            SessionBuilder, Args,
            PrivateKey, KeyAlgorithm, RpcClient, HttpHandler
          } = require('casper-js-sdk');
          const fs = require('fs');

          const NODE_URL = process.env.CASPER_NODE_URL;
          const CHAIN    = process.env.CHAIN_NAME;

          async function main() {
            const rpcClient = new RpcClient(new HttpHandler(NODE_URL));

            const privateKey = await PrivateKey.fromPem(
              fs.readFileSync('/tmp/secret_key.pem', 'utf8'),
              KeyAlgorithm.ED25519
            );

            // Deploy the minimal Casper 2.0-compatible WASM
            const wasm = fs.readFileSync('contract/wasm/FXOracle_deploy.wasm');
            console.log(`WASM size: ${wasm.length} bytes`);

            const transaction = new SessionBuilder()
              .from(privateKey.publicKey)
              .wasm(new Uint8Array(wasm))
              .installOrUpgrade()
              .runtimeArgs(Args.fromMap({}))
              .chainName(CHAIN)
              .payment(50_000_000_000)
              .build();

            transaction.sign(privateKey);

            const result = await rpcClient.putTransaction(transaction);
            const hash = result.transactionHash.toHex
              ? result.transactionHash.toHex()
              : JSON.stringify(result.transactionHash);

            console.log(`Deploy hash: ${hash}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_hash=${hash}\n`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF

          rm -f /tmp/secret_key.pem

      - name: Wait for finality
        run: sleep 90

      - name: Get contract hash from named keys
        id: contract
        run: |
          node << 'JSEOF'
          const { RpcClient, HttpHandler } = require('casper-js-sdk');
          const fs = require('fs');

          async function main() {
            const rpcClient = new RpcClient(new HttpHandler(process.env.CASPER_NODE_URL));
            try {
              const stateRoot = (await rpcClient.getStateRootHashLatest()).stateRootHash;
              const ACCOUNT_HASH = "account-hash-9383e3e17e9c20f19be6316b7cf952d37a6314975a7637cef8abca5f73413b06";
              const resp = await rpcClient.getStateItem(stateRoot, ACCOUNT_HASH, []);
              const namedKeys = resp?.Account?.namedKeys
                || resp?.storedValue?.Account?.namedKeys
                || [];
              console.log(`Named keys: ${namedKeys.length}`);
              if (namedKeys.length) console.log(JSON.stringify(namedKeys));
              let contractHash = "";
              for (const nk of namedKeys) {
                const n = (nk.name || "").toLowerCase();
                if (n.includes("alphx") || n.includes("oracle") || n.includes("fx")) {
                  contractHash = nk.key || "";
                  break;
                }
              }
              console.log(`Contract hash: ${contractHash}`);
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `contract_hash=${contractHash}\n`);
            } catch(e) {
              console.error("Could not get contract hash:", e.message);
            }
          }
          main().catch(console.error);
          JSEOF

      - name: Output results
        run: |
          echo ""
          echo "==============================="
          echo "  ALPHX CONTRACT DEPLOYED"
          echo "==============================="
          echo "  TX hash  : ${{ steps.deploy.outputs.deploy_hash }}"
          echo "  Contract : ${{ steps.contract.outputs.contract_hash }}"
          echo "  Explorer : https://testnet.cspr.live/deploy/${{ steps.deploy.outputs.deploy_hash }}"
          echo "==============================="
          echo "ORACLE_CONTRACT_HASH=${{ steps.contract.outputs.contract_hash }}"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alphx-oracle-wasm-casper2
          path: |
            contract/wasm/FXOracle_deploy.wasm
            contract/wasm/FXOracle.wasm
          retention-days: 30
