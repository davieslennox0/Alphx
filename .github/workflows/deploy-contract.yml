name: Deploy FXOracle Contract to Casper Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet

env:
  CASPER_NODE_URL: https://rpc.testnet.casperlabs.io/rpc
  CHAIN_NAME: casper-test

jobs:
  deploy:
    name: Deploy Pre-built WASM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify WASM exists
        run: ls -lh contract/wasm/FXOracle.wasm

      - name: Install casper-js-sdk
        run: npm install casper-js-sdk@2.15.4

      - name: Deploy to Casper Testnet
        id: deploy
        env:
          SECRET_KEY: ${{ secrets.ORACLE_WALLET_SECRET_KEY }}
        run: |
          echo "$SECRET_KEY" > /tmp/secret_key.pem
          chmod 600 /tmp/secret_key.pem

          node << 'JSEOF'
          const { CasperClient, DeployUtil, Keys, RuntimeArgs } = require('casper-js-sdk');
          const fs = require('fs');

          const NODE_URL = process.env.CASPER_NODE_URL;
          const CHAIN   = process.env.CHAIN_NAME;

          async function main() {
            const client  = new CasperClient(NODE_URL);
            const keyPair = Keys.Ed25519.loadKeyPairFromPrivateFile('/tmp/secret_key.pem');
            const wasm    = fs.readFileSync('contract/wasm/FXOracle.wasm');

            const params  = new DeployUtil.DeployParams(keyPair.publicKey, CHAIN, 1, 1800000);
            const session = DeployUtil.ExecutableDeployItem.newModuleBytes(
              Uint8Array.from(wasm),
              RuntimeArgs.fromMap({})
            );
            const payment = DeployUtil.standardPayment(50_000_000_000);

            const deploy = DeployUtil.makeDeploy(params, session, payment);
            const signed = DeployUtil.signDeploy(deploy, keyPair);

            const hash = await client.putDeploy(signed);
            console.log(`Deploy hash: ${hash}`);

            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `deploy_hash=${hash}\n`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF

          rm -f /tmp/secret_key.pem

      - name: Wait for finality
        run: sleep 60

      - name: Get contract hash
        id: contract
        run: |
          node << 'JSEOF'
          const { CasperClient } = require('casper-js-sdk');
          const fs = require('fs');

          const NODE_URL = process.env.CASPER_NODE_URL;
          const PUB_KEY  = "019bec4eb56ae4a5d4798d5de6996afa5541a6ae94b0e889351d7ed5ae359f5a74";

          async function main() {
            const client    = new CasperClient(NODE_URL);
            const stateRoot = await client.nodeClient.getStateRootHash();
            const account   = await client.nodeClient.getBlockState(stateRoot, `account-hash-9383e3e17e9c20f19be6316b7cf952d37a6314975a7637cef8abca5f73413b06`, []);
            const namedKeys = account?.Account?.namedKeys || [];
            let contractHash = "";
            for (const nk of namedKeys) {
              const n = nk.name.toLowerCase();
              if (n.includes("alphx") || n.includes("oracle") || n.includes("fx")) {
                contractHash = nk.key;
                break;
              }
            }
            console.log(`Contract hash: ${contractHash}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `contract_hash=${contractHash}\n`);
          }

          main().catch(e => { console.error("Could not get contract hash:", e.message); });
          JSEOF

      - name: Output results
        run: |
          echo ""
          echo "==============================="
          echo "  ALPHX CONTRACT DEPLOYED"
          echo "==============================="
          echo "  Deploy hash : ${{ steps.deploy.outputs.deploy_hash }}"
          echo "  Contract    : ${{ steps.contract.outputs.contract_hash }}"
          echo "  Explorer    : https://testnet.cspr.live/deploy/${{ steps.deploy.outputs.deploy_hash }}"
          echo "==============================="
          echo "Add to .env:"
          echo "ORACLE_CONTRACT_HASH=${{ steps.contract.outputs.contract_hash }}"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphx-oracle-wasm
          path: contract/wasm/*.wasm
          retention-days: 30
